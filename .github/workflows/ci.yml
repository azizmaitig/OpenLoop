name: CI

on:
  push:
    branches:
      - main
      - 'vault/*'
  pull_request:
    branches:
      - main
      - 'vault/*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run typecheck
      - run: cd dashboard && bun install && bun run build
      - run: cd dashboard && bun run typecheck
      - run: bun test
