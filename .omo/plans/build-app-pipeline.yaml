# build-app-pipeline.yaml — reusable 10-stage build-from-scratch template
#
# OWNER SUBSTITUTION REQUIRED BEFORE RUNNING:
#   The executor does a literal YAML parse (no variable interpolation). Replace every
#   {{TARGET_DIR}} below with the real absolute project path, e.g.:
#     envsubst < .omo/plans/build-app-pipeline.yaml > /tmp/run.yaml
#     (or:  (Get-Content .omo/plans/build-app-pipeline.yaml) -replace '\{\{TARGET_DIR\}\}', 'D:\path\to\app' | Set-Content run.yaml)
#   Then run:  bun run loop.ts start --plan run.yaml --max-iterations 1
#
# PRECONDITIONS (owner-owned, NOT assumed by this template):
#   1. L2 (source editing) MUST be enabled in AGENTS.md before running — the code/test
#      stages edit source. This is a human runtime toggle; the template does not flip it.
#   2. opencode MUST be on PATH (every delegating stage invokes `opencode run ...`).
#   3. --max-iterations N: N=1 = one-shot build; N>1 = the WHOLE plan re-loops N times on
#      pass (N full rebuilds). There is NO per-stage retry today. Hard cap 20 (config.ts).
#
# SAFETY RAILS (baked into every stage):
#   R1 Infinite-loop/recovery guard (REDEFINED): the `code` stage authors healCommand +
#      maxRetries:3 but per ADR-0009 they are NO-OPS until ADR-0011 is implemented. The real
#      guard today is per-stage timeoutMs + command exit-0 + the --max-iterations cap.
#   R2 Context-rot guard: every stage writes output to a FILE in {{TARGET_DIR}}/.build/;
#      the next stage reads that file. No accumulated chat context.
#   R3 Scope-creep guard: the code task prompt lists NON-GOALS and forbids features absent
#      from spec.md.
#   R4 Evidence-not-claim: verify is the non-LLM exit-0 hard gate. design-critique/review/
#      evaluate LLM passed/false does NOT fail a phase unless the command exits non-zero
#      (loop-runner.ts resolveHardcoded). LLM verdicts are advisory only.
#   R5 Checkpoint/resume: relies on .checkpoint.json resume (loop-runner.ts prompts Y/n).

planName: build-app

tasks:
  - id: read-state
    command: type STATE.md
    timeoutMs: 5000

  - id: planning
    command: >-
      opencode run "Read {{TARGET_DIR}}/.build/STATE.md if present, otherwise infer project
      intent from the working directory. Write a concise product spec to
      {{TARGET_DIR}}/.build/spec.md covering: goal, users, core features (MVP scope only),
      out-of-scope, tech-stack recommendation, and acceptance criteria. Keep it under 400
      lines. Exit 0 when the file is written." --dir "{{TARGET_DIR}}"
    timeoutMs: 180000

  - id: research
    command: >-
      opencode run "Read {{TARGET_DIR}}/.build/spec.md. Research the recommended tech stack and
      the top 3-5 risks/unknowns for this MVP (library choices, integration gotchas, perf
      ceilings). Write findings to {{TARGET_DIR}}/.build/research.md: for each risk give
      evidence, a recommended approach, and a fallback. Do NOT write code. Exit 0 when the
      file is written." --dir "{{TARGET_DIR}}"
    timeoutMs: 180000

  - id: design
    command: >-
      opencode run "Read {{TARGET_DIR}}/.build/spec.md and {{TARGET_DIR}}/.build/research.md.
      Produce a concrete technical design in {{TARGET_DIR}}/.build/design.md: module/component
      breakdown, data model, API surface, key algorithms, file layout, and a build/test
      strategy. Also note any design decisions needing an ADR. Do NOT write application code.
      Exit 0 when the file is written." --dir "{{TARGET_DIR}}"
    timeoutMs: 180000

  - id: design-critique
    command: >-
      opencode run "Read {{TARGET_DIR}}/.build/design.md and {{TARGET_DIR}}/.build/spec.md.
      Critique the design against the spec: missing requirements, over-engineering, security
      or scalability gaps, and unclear interfaces. Write the verdict to
      {{TARGET_DIR}}/.build/design-critique.md with an explicit APPROVE or REVISE decision and
      a prioritized list of issues (P0-P2). Do NOT modify any source files. Exit 0 when the
      file is written." --dir "{{TARGET_DIR}}"
    timeoutMs: 120000
    llm:
      provider: opencode
      prompt: >-
        You are a senior architecture reviewer. Stdout holds the design-critique.md content.
        Return JSON: { "passed": boolean (true=APPROVE, false=REVISE), "reason": "markdown
        report with P0-P2 issues and whether design meets spec", "confidence": 0.0-1.0 }.

  - id: code
    command: >-
      opencode run "Read {{TARGET_DIR}}/.build/design.md and {{TARGET_DIR}}/.build/spec.md.
      Implement the MVP inside {{TARGET_DIR}} (work in a git worktree if one is provided via
      --dir; otherwise create one with 'git worktree add' or commit to a feature branch).
      Follow the design faithfully. NON-GOALS: do not add features absent from spec.md, do not
      add auth/payments/secrets handling unless explicitly in spec, do not refactor unrelated
      code, do not write tests here (that is the test stage). Write a unified diff summary to
      {{TARGET_DIR}}/.build/code.diff. Exit 0 when implementation + code.diff are written.
      Assumes the human has enabled L2 (source editing) before this run." --dir "{{TARGET_DIR}}"
    timeoutMs: 300000
    healCommand: >-
      opencode run "Re-read {{TARGET_DIR}}/.build/code.diff and the failing build/test output.
      Apply the minimal fix to the MVP in {{TARGET_DIR}} and update {{TARGET_DIR}}/.build/code.diff.
      Do not expand scope beyond the failing concern. Exit 0 when fixed." --dir "{{TARGET_DIR}}"
    maxRetries: 3

  - id: test
    command: >-
      opencode run "Run the project's documented build + test suite for {{TARGET_DIR}} (e.g.
      'bun test' / 'npm test' / 'pytest'). Capture results to {{TARGET_DIR}}/.build/test.log.
      Exit 0 only if build and tests pass; otherwise exit non-zero so the phase fails.
      Do NOT modify application code — only run the suite." --dir "{{TARGET_DIR}}"
    timeoutMs: 120000

  - id: review
    command: >-
      opencode run "Read {{TARGET_DIR}}/.build/code.diff and {{TARGET_DIR}}/.build/design.md.
      Perform a code review: correctness, security, readability, and adherence to the design.
      Write findings to {{TARGET_DIR}}/.build/review.md with P0-P2 issues and a verdict.
      Do NOT modify source. Exit 0 when the file is written." --dir "{{TARGET_DIR}}"
    timeoutMs: 120000
    llm:
      provider: opencode
      prompt: >-
        You are a senior code reviewer. Stdout holds review.md. Return JSON:
        { "passed": boolean, "reason": "markdown review with P0-P2 issues and verdict",
        "confidence": 0.0-1.0 }.

  - id: evaluate
    command: >-
      opencode run "Read {{TARGET_DIR}}/.build/spec.md (acceptance criteria),
      {{TARGET_DIR}}/.build/test.log, and {{TARGET_DIR}}/.build/review.md. Judge whether the
      built MVP satisfies the acceptance criteria and is shippable. Write the verdict to
      {{TARGET_DIR}}/.build/evaluate.md (ADVISORY — does not block the run). Exit 0 when the
      file is written." --dir "{{TARGET_DIR}}"
    timeoutMs: 120000
    llm:
      provider: opencode
      prompt: >-
        You are a quality evaluator. Stdout holds evaluate.md. Return JSON:
        { "passed": boolean, "reason": "markdown verdict vs acceptance criteria, gaps,
        ship/no-ship recommendation", "confidence": 0.0-1.0 }.

  - id: verify
    command: >-
      opencode run "Final non-LLM gate for {{TARGET_DIR}}: re-run build + the FULL test suite
      and confirm exit 0. Also confirm {{TARGET_DIR}}/.build/code.diff, test.log, review.md,
      and evaluate.md all exist. Exit 0 only if build+tests pass; otherwise exit non-zero.
      This is the hard gate — no LLM judgment, command exit code decides pass/fail."
      --dir "{{TARGET_DIR}}"
    timeoutMs: 120000
