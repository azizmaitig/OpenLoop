<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>agent-loop dashboard</title>
<style>
:root {
  /* ── Fonts ────────────────────────────────────────── */
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'Cascadia Code', 'JetBrains Mono', Consolas, 'Courier New', monospace;

  /* ── Dark mode colors (primary) ──────────────────── */
  --color-bg: #0b0d10;
  --color-bg-elevated: #14161c;
  --color-bg-hover: #1d2028;
  --color-bg-input: #0b0d10;
  --color-bg-logs: #08090c;

  --color-text-primary: #e2e4ea;
  --color-text-secondary: #969ba8;
  --color-text-brand: #00ff88;
  --color-text-inverse: #0b0d10;

  --color-border: #282c35;
  --color-border-hover: #3b3f4a;
  --color-border-focus: #00ff88;

  /* ── Semantic colors ─────────────────────────────── */
  --color-accent: #00ff88;
  --color-accent-hover: #2aff99;
  --color-accent-bg: rgba(0, 255, 136, 0.08);

  --color-warning: #ffa64d;
  --color-warning-hover: #ffb870;
  --color-warning-bg: rgba(255, 166, 77, 0.08);

  --color-error: #ff5555;
  --color-error-hover: #ff7777;
  --color-error-bg: rgba(255, 85, 85, 0.08);

  --color-success: #33d988;
  --color-success-bg: rgba(51, 217, 136, 0.08);

  --color-neutral: #6b7280;
  --color-neutral-bg: rgba(107, 114, 128, 0.08);

  /* ── Spacing scale (4px base) ────────────────────── */
  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-5: 1.25rem;
  --space-6: 1.5rem;
  --space-8: 2rem;
  --space-10: 2.5rem;
  --space-12: 3rem;

  /* ── Typography scale ────────────────────────────── */
  --text-xs: 0.7rem;
  --text-sm: 0.8rem;
  --text-base: 0.9rem;
  --text-lg: 1rem;
  --text-xl: 1.1rem;

  /* ── Radii ────────────────────────────────────────── */
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 8px;

  /* ── Z-index ─────────────────────────────────────── */
  --z-sticky: 100;
  --z-overlay: 200;
  --z-modal: 300;

  /* ── Shadows ─────────────────────────────────────── */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 2px 6px rgba(0, 0, 0, 0.4);

  /* ── Transitions ─────────────────────────────────── */
  --transition-fast: 120ms ease;
  --transition-base: 180ms ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 14px; }

body {
  background: var(--color-bg);
  color: var(--color-text-primary);
  font-family: var(--font-sans);
  font-size: var(--text-base);
  line-height: 1.6;
  color-scheme: dark;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

::selection {
  background: var(--color-accent-bg);
  color: var(--color-text-primary);
}

a {
  color: var(--color-accent);
  text-decoration: none;
  transition: color var(--transition-fast);
}
a:hover { text-decoration: underline; }
a:focus-visible {
  outline: 2px solid var(--color-border-focus);
  outline-offset: 2px;
  border-radius: var(--radius-sm);
}

/* ── Scrollbar ──────────────────────────────────────── */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--color-border-hover); }

/* ── Header ────────────────────────────────────────── */
header {
  position: sticky;
  top: 0;
  z-index: var(--z-sticky);
  background: var(--color-bg);
  border-bottom: 1px solid var(--color-border);
  padding: var(--space-3) var(--space-6);
  display: flex;
  align-items: center;
  gap: var(--space-6);
  box-shadow: var(--shadow-sm);
}

header h1 {
  font-family: var(--font-mono);
  font-size: var(--text-lg);
  font-weight: 600;
  color: var(--color-accent);
  letter-spacing: -0.02em;
}

header nav { display: flex; gap: var(--space-2); }

header nav a {
  color: var(--color-text-secondary);
  font-size: var(--text-sm);
  font-family: var(--font-sans);
  padding: var(--space-1) var(--space-2);
  border-radius: var(--radius-sm);
  transition: color var(--transition-fast), background var(--transition-fast);
}
header nav a:hover {
  color: var(--color-text-primary);
  text-decoration: none;
  background: var(--color-bg-hover);
}
header nav a.active {
  color: var(--color-accent);
  background: var(--color-accent-bg);
}

/* ── WS indicator ──────────────────────────────────── */
.ws-indicator {
  margin-left: auto;
  font-size: var(--text-xs);
  font-family: var(--font-mono);
  display: flex;
  align-items: center;
  gap: var(--space-1);
  color: var(--color-text-secondary);
}

/* ── Main ──────────────────────────────────────────── */
main {
  max-width: 1024px;
  margin: 0 auto;
  padding: var(--space-6);
}

/* ── Cards ─────────────────────────────────────────── */
.card {
  background: var(--color-bg-elevated);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: var(--space-5);
  margin: var(--space-3) 0;
  box-shadow: var(--shadow-sm);
  transition: border-color var(--transition-fast);
}

.card h2 {
  font-family: var(--font-sans);
  font-size: var(--text-lg);
  font-weight: 600;
  color: var(--color-text-primary);
  margin-bottom: var(--space-3);
  padding-bottom: var(--space-2);
  border-bottom: 1px solid var(--color-border);
}

/* ── Key-value rows ────────────────────────────────── */
.kv {
  display: grid;
  grid-template-columns: 130px 1fr;
  gap: var(--space-1) var(--space-3);
  font-size: var(--text-sm);
  font-family: var(--font-sans);
}
.kv dt {
  color: var(--color-text-secondary);
  padding: var(--space-1) 0;
}
.kv dd {
  color: var(--color-text-primary);
  font-family: var(--font-mono);
  padding: var(--space-1) 0;
  word-break: break-word;
}

/* ── Status badges ─────────────────────────────────── */
.badge {
  display: inline-block;
  padding: 2px var(--space-2);
  border-radius: var(--radius-sm);
  font-size: var(--text-xs);
  font-family: var(--font-mono);
  font-weight: 500;
  border: 1px solid transparent;
  line-height: 1.5;
}
.badge.running,
.badge.active {
  background: var(--color-accent-bg);
  color: var(--color-accent);
  border-color: var(--color-accent);
}
.badge.pending,
.badge.queued {
  background: var(--color-warning-bg);
  color: var(--color-warning);
  border-color: var(--color-warning);
}
.badge.completed,
.badge.success,
.badge.done {
  background: var(--color-success-bg);
  color: var(--color-success);
  border-color: var(--color-success);
}
.badge.failed,
.badge.error {
  background: var(--color-error-bg);
  color: var(--color-error);
  border-color: var(--color-error);
}
.badge.stopped,
.badge.idle {
  background: var(--color-neutral-bg);
  color: var(--color-neutral);
  border-color: var(--color-neutral);
}

/* ── Tables ────────────────────────────────────────── */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: var(--text-sm);
  font-family: var(--font-mono);
}

thead th {
  text-align: left;
  padding: var(--space-2) var(--space-3);
  border-bottom: 1px solid var(--color-border);
  color: var(--color-text-secondary);
  font-weight: 500;
  font-family: var(--font-sans);
  cursor: pointer;
  user-select: none;
  transition: color var(--transition-fast);
}
thead th:hover { color: var(--color-text-primary); }
thead th .sort-arrow {
  margin-left: var(--space-1);
  color: var(--color-accent);
  font-size: var(--text-xs);
}

tbody td {
  padding: var(--space-2) var(--space-3);
  border-bottom: 1px solid var(--color-border);
  vertical-align: middle;
  font-family: var(--font-mono);
}
tbody tr:hover { background: var(--color-bg-hover); }
tbody tr.clickable { cursor: pointer; }

/* ── Buttons ───────────────────────────────────────── */
button, .btn {
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  padding: var(--space-1) var(--space-3);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  background: var(--color-bg-elevated);
  color: var(--color-text-primary);
  transition: background var(--transition-fast), border-color var(--transition-fast), color var(--transition-fast);
  line-height: 1.5;
}
button:hover, .btn:hover {
  background: var(--color-bg-hover);
  border-color: var(--color-border-hover);
}
button:focus-visible,
.btn:focus-visible {
  outline: 2px solid var(--color-border-focus);
  outline-offset: 2px;
}
button:active, .btn:active {
  transform: translateY(1px);
}

button.primary {
  background: var(--color-accent-bg);
  border-color: var(--color-accent);
  color: var(--color-accent);
}
button.primary:hover {
  background: rgba(0, 255, 136, 0.18);
  border-color: var(--color-accent-hover);
}

button.danger {
  border-color: var(--color-error);
  color: var(--color-error);
}
button.danger:hover {
  background: var(--color-error-bg);
  border-color: var(--color-error-hover);
}

button.warning {
  border-color: var(--color-warning);
  color: var(--color-warning);
}
button.warning:hover {
  background: var(--color-warning-bg);
  border-color: var(--color-warning-hover);
}

button.small {
  padding: var(--space-1) var(--space-2);
  font-size: var(--text-xs);
}

button:disabled {
  opacity: 0.35;
  cursor: not-allowed;
  pointer-events: none;
}

/* ── Form ──────────────────────────────────────────── */
.form-row {
  display: flex;
  gap: var(--space-2);
  margin: var(--space-2) 0;
}

input[type=text] {
  flex: 1;
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  padding: var(--space-2) var(--space-3);
  background: var(--color-bg-input);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  color: var(--color-text-primary);
  outline: none;
  transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
}
input[type=text]::placeholder {
  color: var(--color-text-secondary);
  opacity: 0.6;
}
input[type=text]:focus {
  border-color: var(--color-border-focus);
  box-shadow: 0 0 0 3px var(--color-accent-bg);
}

/* ── Logs ──────────────────────────────────────────── */
.logs {
  background: var(--color-bg-logs);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  padding: var(--space-3);
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  line-height: 1.5;
  max-height: 400px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-all;
  color: var(--color-text-primary);
}

/* ── Pagination ────────────────────────────────────── */
.pagination {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  margin-top: var(--space-3);
}
.pagination span {
  font-size: var(--text-sm);
  font-family: var(--font-sans);
  color: var(--color-text-secondary);
}

/* ── Filter row ────────────────────────────────────── */
.filter-row {
  margin-bottom: var(--space-3);
  display: flex;
  gap: var(--space-2);
  align-items: center;
}
.filter-row label {
  font-size: var(--text-sm);
  font-family: var(--font-sans);
  color: var(--color-text-secondary);
  white-space: nowrap;
}

/* ── Loading / empty / error states ────────────────── */
.loading,
.empty {
  color: var(--color-text-secondary);
  font-size: var(--text-sm);
  font-family: var(--font-sans);
  padding: var(--space-6);
  text-align: center;
}
.error-state {
  color: var(--color-error);
  font-size: var(--text-sm);
  font-family: var(--font-sans);
  padding: var(--space-3);
}

/* ── Status dot ─────────────────────────────────────── */
.status-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: var(--space-1);
  flex-shrink: 0;
}
.status-dot.online {
  background: var(--color-accent);
  box-shadow: 0 0 6px var(--color-accent);
}
.status-dot.offline {
  background: var(--color-error);
  box-shadow: 0 0 6px var(--color-error);
}
.status-dot.warning {
  background: var(--color-warning);
  box-shadow: 0 0 6px var(--color-warning);
}

/* ── Back link ──────────────────────────────────────── */
.back-link {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  margin-bottom: var(--space-4);
  font-size: var(--text-sm);
  font-family: var(--font-sans);
}
.back-link:focus-visible {
  outline: 2px solid var(--color-border-focus);
  outline-offset: 2px;
  border-radius: var(--radius-sm);
}

/* ── Action group ──────────────────────────────────── */
.action-group {
  display: flex;
  gap: var(--space-2);
  flex-wrap: wrap;
  margin: var(--space-3) 0;
}

/* ── Duration ──────────────────────────────────────── */
.duration {
  color: var(--color-text-secondary);
  font-size: var(--text-sm);
  font-family: var(--font-mono);
}

/* ── Utility table-wrap (targets inline-style overflow) ─── */
.card div[style*="overflow-x"] table {
  min-width: max-content;
}

/* ── Reduced motion ─────────────────────────────────── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    transition-duration: 0s !important;
    animation-duration: 0s !important;
  }
  button:active, .btn:active {
    transform: none;
  }
}

/* ── Responsive ──────────────────────────────────────── */
@media (max-width: 768px) {
  header {
    padding: var(--space-2) var(--space-4);
    gap: var(--space-3);
  }
  main { padding: var(--space-4); }
  .card { padding: var(--space-4); }
  .kv { grid-template-columns: 1fr; gap: var(--space-1); }
  .kv dt { padding-bottom: 0; }
  .kv dd { margin-bottom: var(--space-1); }
}

@media (max-width: 640px) {
  header { flex-wrap: wrap; gap: var(--space-2); padding: var(--space-2) var(--space-3); }
  header h1 { width: 100%; }
  header nav { width: 100%; }
  .ws-indicator { margin-left: 0; }
  main { padding: var(--space-3); }
  .card { padding: var(--space-3); }
  .kv { grid-template-columns: 1fr; gap: 2px; }
  .kv dd { margin-bottom: var(--space-1); }
  .form-row { flex-direction: column; }
  .action-group { flex-direction: column; }
  .filter-row { flex-direction: column; align-items: stretch; }
  table { font-size: var(--text-xs); }
  thead th, tbody td { padding: var(--space-1) var(--space-2); }
  .pagination { flex-wrap: wrap; }
}

/* ── Metrics tab ─────────────────────────────────────── */
.metrics-cards { display: flex; gap: var(--space-4); margin-bottom: var(--space-4); }
.stat-card {
  flex: 1;
  background: var(--color-bg-elevated);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: var(--space-4);
  text-align: center;
}
.stat-card .stat-value {
  font-size: var(--text-xl);
  font-weight: 700;
  color: var(--color-text-primary);
  font-family: var(--font-mono);
}
.stat-card .stat-label {
  font-size: var(--text-xs);
  color: var(--color-text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: var(--space-1);
}
.window-selector { display: flex; gap: var(--space-2); margin-bottom: var(--space-4); }
.window-selector button.active {
  background: var(--color-accent-bg);
  border-color: var(--color-accent);
  color: var(--color-accent);
}
.chart-container { position: relative; min-height: 250px; }
.note { font-size: var(--text-xs); color: var(--color-text-secondary); margin-top: var(--space-2); font-style: italic; }
@media (max-width: 640px) {
  .metrics-cards { flex-direction: column; }
}
</style>
</head>
<body>

<header>
  <h1>agent-loop</h1>
  <nav id="nav" aria-label="Main navigation">
    <a href="#/">Live</a>
    <a href="#/history">History</a>
    <a href="#/metrics">Metrics</a>
  </nav>
  <span class="ws-indicator" id="wsIndicator">
    <span class="status-dot offline" id="wsDot"></span>
    <span id="wsLabel">disconnected</span>
  </span>
</header>

<main id="main" role="main"></main>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
(function () {
'use strict';

/* ── Config ───────────────────────────────────────────── */
var WS_RECONNECT_DELAY = 3000;
var HISTORY_PAGE_SIZE = 20;

/* ── DOM refs ─────────────────────────────────────────── */
var $main = document.getElementById('main');
var $nav = document.getElementById('nav');
var $wsDot = document.getElementById('wsDot');
var $wsLabel = document.getElementById('wsLabel');

/* ── State ────────────────────────────────────────────── */
var ws = null;
var wsReconnectTimer = null;
var currentRoute = '';
var historyPage = 1;
var historyFilter = '';
var historySort = { col: 'createdAt', dir: 'desc' };
var metricsWindow = '1h';

/* ── Fetch wrapper ────────────────────────────────────── */
function api(method, url, body) {
  var opts = { method: method, headers: {} };
  if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  return fetch(url, opts).then(function (res) {
    if (!res.ok) {
      return res.text().then(function (text) {
        throw new Error(res.status + ' ' + res.statusText + (text ? ': ' + text : ''));
      });
    }
    return res.json();
  });
}

function apiGet(url) { return api('GET', url); }
function apiPost(url, body) { return api('POST', url, body); }

/* ── Helpers ──────────────────────────────────────────── */
function esc(str) {
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function durationStr(ms) {
  if (ms == null) return '-';
  if (ms < 1000) return ms + 'ms';
  if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
  var m = Math.floor(ms / 60000);
  var s = Math.floor((ms % 60000) / 1000);
  return m + 'm ' + s + 's';
}

function badgeHtml(status) {
  var s = (status || '').toLowerCase();
  var cls = '';
  if (s === 'running' || s === 'active') cls = 'running';
  else if (s === 'pending' || s === 'queued') cls = 'pending';
  else if (s === 'completed' || s === 'success' || s === 'done') cls = 'completed';
  else if (s === 'failed' || s === 'error') cls = 'failed';
  else if (s === 'stopped' || s === 'idle') cls = 'stopped';
  else cls = 'pending';
  return '<span class="badge ' + cls + '">' + esc(status || 'unknown') + '</span>';
}

function timeStr(iso) {
  if (!iso) return '-';
  var d = new Date(iso);
  return d.toLocaleString();
}

/* ── WebSocket ────────────────────────────────────────── */
function connectWs() {
  if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws');

  ws.onopen = function () {
    $wsDot.className = 'status-dot online';
    $wsLabel.textContent = 'connected';
    if (wsReconnectTimer) { clearTimeout(wsReconnectTimer); wsReconnectTimer = null; }
  };

  ws.onclose = function () {
    $wsDot.className = 'status-dot offline';
    $wsLabel.textContent = 'reconnecting...';
    ws = null;
    wsReconnectTimer = setTimeout(connectWs, WS_RECONNECT_DELAY);
  };

  ws.onerror = function () {
    /* onclose will fire after this, reconnect handled there */
  };

  ws.onmessage = function (evt) {
    var msg;
    try { msg = JSON.parse(evt.data); } catch (e) { return; }
    handleWsMsg(msg);
  };
}

function handleWsMsg(msg) {
  var t = (msg.type || '').toLowerCase();
  if (t === 'state_change') {
    if (currentRoute === '#/') renderLive();
  } else if (t === 'task_completed') {
    if (currentRoute === '#/history') renderHistory();
  } else if (t === 'child_status_change') {
    if (currentRoute === '#/') renderChildren();
  }
}

/* ── Router ───────────────────────────────────────────── */
function navigate(hash) {
  if (!hash || hash === '#') hash = '#/';
  currentRoute = hash;
  updateNav(hash);
  renderRoute(hash);
}

function updateNav(hash) {
  var links = $nav.querySelectorAll('a');
  var i;
  for (i = 0; i < links.length; i++) {
    var href = links[i].getAttribute('href');
    if (hash === '#/' && href === '#/') { links[i].className = 'active'; }
    else if (hash === '#/history' && href === '#/history') { links[i].className = 'active'; }
    else if (hash === '#/metrics' && href === '#/metrics') { links[i].className = 'active'; }
    else if (hash.indexOf('#/task/') === 0 && href === '#/history') { links[i].className = 'active'; }
    else { links[i].className = ''; }
  }
}

function renderRoute(hash) {
  if (hash === '#/' || hash === '') {
    renderLive();
  } else if (hash === '#/history') {
    renderHistory();
  } else if (hash === '#/metrics') {
    renderMetrics();
  } else if (hash.indexOf('#/task/') === 0) {
    var id = hash.replace('#/task/', '');
    renderTask(id);
  } else {
    $main.innerHTML = '<div class="card"><p>Page not found. <a href="#/">Go to Live dashboard.</a></p></div>';
  }
}

/* ── Page: Live (#/) ──────────────────────────────────── */
function renderLive() {
  $main.innerHTML = '<div class="loading">Loading...</div>';
  Promise.all([
    apiGet('/state').catch(function (e) { return { error: e.message }; }),
    apiGet('/loops').catch(function (e) { return { error: e.message }; })
  ]).then(function (results) {
    var state = results[0];
    var loops = results[1];
    if (state && !state.error) state._loops = Array.isArray(loops) ? loops : [];
    $main.innerHTML = liveHtml(state, Array.isArray(loops) ? loops : []);
    bindLiveEvents(state);
  });
}

function liveHtml(state, loops) {
  var h = '';

  /* Daemon status */
  h += '<section class="card">';
  h += '<h2>Daemon Status</h2>';
  h += '<dl class="kv">';
  if (state && state.error) {
    h += '<dt>Error</dt><dd class="error-state">' + esc(state.error) + '</dd>';
  } else if (state) {
    h += '<dt>Status</dt><dd>' + badgeHtml(state.status || 'unknown') + '</dd>';
    h += '<dt>Uptime</dt><dd>' + durationStr(state.uptime) + '</dd>';
    h += '<dt>Version</dt><dd>' + esc(state.version || '-') + '</dd>';
    h += '<dt>PID</dt><dd>' + esc(state.pid != null ? String(state.pid) : '-') + '</dd>';
    h += '<dt>Port</dt><dd>' + esc(state.port != null ? String(state.port) : '-') + '</dd>';
    h += '<dt>Queue</dt><dd>' + esc(state.queueLength != null ? String(state.queueLength) : '-') + '</dd>';
  } else {
    h += '<dt>Error</dt><dd class="error-state">Failed to connect</dd>';
  }
  h += '</dl>';
  h += '<div class="action-group">';
  h += '<button class="danger" id="stopDaemonBtn">Stop Daemon</button>';
  h += '</div>';
  h += '</section>';

  /* Current task */
  h += '<section class="card">';
  h += '<h2>Current Task</h2>';
  if (state && state.currentTask) {
    var t = state.currentTask;
    h += '<dl class="kv">';
    h += '<dt>ID</dt><dd>' + esc(t.id || '-') + '</dd>';
    h += '<dt>Command</dt><dd>' + esc(t.command || '-') + '</dd>';
    h += '<dt>Status</dt><dd>' + badgeHtml(t.status) + '</dd>';
    h += '<dt>Started</dt><dd>' + timeStr(t.startedAt || t.startTime) + '</dd>';
    h += '</dl>';
  } else {
    h += '<p class="empty">No task running</p>';
  }
  h += '</section>';

  /* Queue */
  h += '<section class="card">';
  h += '<h2>Queue</h2>';
  if (state && state.queue && state.queue.length > 0) {
    h += '<div style="overflow-x:auto"><table><thead><tr>';
    h += '<th>ID</th><th>Command</th><th>Status</th>';
    h += '</tr></thead><tbody>';
    for (var i = 0; i < state.queue.length; i++) {
      var q = state.queue[i];
      h += '<tr>';
      h += '<td>' + esc(q.id || '-') + '</td>';
      h += '<td>' + esc(q.command || '-') + '</td>';
      h += '<td>' + badgeHtml(q.status) + '</td>';
      h += '</tr>';
    }
    h += '</tbody></table></div>';
  } else {
    h += '<p class="empty">Queue is empty</p>';
  }
  h += '</section>';

  /* Children */
  h += '<section class="card">';
  h += '<h2>Children</h2>';
  if (loops.length === 0) {
    h += '<p class="empty">No child loops</p>';
  } else {
    h += '<div style="overflow-x:auto"><table><thead><tr>';
    h += '<th>ID</th><th>Name</th><th>Status</th><th>Plan Path</th><th>Actions</th>';
    h += '</tr></thead><tbody>';
    for (var j = 0; j < loops.length; j++) {
      var c = loops[j];
      var cId = esc(c.id || '');
      var cStatus = (c.status || '').toLowerCase();
      var isRunning = cStatus === 'running' || cStatus === 'active';
      var btnId = 'child-' + cId.replace(/[^a-zA-Z0-9_-]/g, '_') + '-' + (isRunning ? 'stop' : 'start');
      h += '<tr>';
      h += '<td>' + esc(c.id || '-') + '</td>';
      h += '<td>' + esc(c.name || '-') + '</td>';
      h += '<td>' + badgeHtml(c.status) + '</td>';
      h += '<td>' + esc(c.planPath || '-') + '</td>';
      h += '<td>';
      h += '<button class="small ' + (isRunning ? 'warning' : 'primary') + '" id="' + btnId + '">';
      h += (isRunning ? 'Stop' : 'Start');
      h += '</button>';
      h += '</td>';
      h += '</tr>';
    }
    h += '</tbody></table></div>';
  }
  h += '</section>';

  /* Trigger task form */
  h += '<section class="card">';
  h += '<h2>Trigger Task</h2>';
  h += '<div class="form-row">';
  h += '<input type="text" id="taskCommand" placeholder="command to execute" />';
  h += '<button class="primary" id="triggerTaskBtn">Submit</button>';
  h += '</div>';
  h += '</section>';

  return h;
}

function bindLiveEvents(state) {
  /* Stop daemon */
  var stopBtn = document.getElementById('stopDaemonBtn');
  if (stopBtn) {
    stopBtn.addEventListener('click', function () {
      if (!confirm('Stop the daemon?')) return;
      stopBtn.disabled = true;
      stopBtn.textContent = 'Stopping...';
      apiPost('/stop').then(function () {
        renderLive();
      }).catch(function (e) {
        alert('Failed: ' + e.message);
        stopBtn.disabled = false;
        stopBtn.textContent = 'Stop Daemon';
      });
    });
  }

  /* Child start/stop */
  var childBtns = document.querySelectorAll('[id^="child-"]');
  var i;
  for (i = 0; i < childBtns.length; i++) {
    (function (btn) {
      btn.addEventListener('click', function () {
        var id = btn.id;
        /* id format: child-<encodedId>-start or child-<encodedId>-stop */
        var lastDash = id.lastIndexOf('-');
        var action = id.substring(lastDash + 1);
        var rawId = id.substring(6, lastDash);
        btn.disabled = true;
        var url = '/loops/' + encodeURIComponent(rawId) + '/' + action;
        apiPost(url).then(function () {
          renderLive();
        }).catch(function (e) {
          alert('Failed: ' + e.message);
          btn.disabled = false;
        });
      });
    })(childBtns[i]);
  }

  /* Trigger task */
  var triggerBtn = document.getElementById('triggerTaskBtn');
  var taskInput = document.getElementById('taskCommand');
  if (triggerBtn && taskInput) {
    triggerBtn.addEventListener('click', function () {
      var cmd = taskInput.value.trim();
      if (!cmd) return;
      triggerBtn.disabled = true;
      triggerBtn.textContent = 'Submitting...';
      apiPost('/task', { command: cmd }).then(function () {
        taskInput.value = '';
        renderLive();
      }).catch(function (e) {
        alert('Failed: ' + e.message);
        triggerBtn.disabled = false;
        triggerBtn.textContent = 'Submit';
      });
    });
    taskInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') triggerBtn.click();
    });
  }
}

/* ── Page: History (#/history) ────────────────────────── */
function renderHistory() {
  $main.innerHTML = '<div class="loading">Loading...</div>';
  var url = '/api/history?page=' + historyPage + '&pageSize=' + HISTORY_PAGE_SIZE;
  apiGet(url).then(function (data) {
    $main.innerHTML = historyHtml(data);
    bindHistoryEvents(data);
  }).catch(function (e) {
    $main.innerHTML = '<div class="card error-state">Failed to load history: ' + esc(e.message) + '</div>';
  });
}

function historyHtml(data) {
  var tasks = (data && data.tasks) || [];
  var total = data && data.total != null ? data.total : 0;
  var totalPages = Math.max(1, Math.ceil(total / HISTORY_PAGE_SIZE));
  var filtered = tasks;

  /* Apply client-side filter */
  if (historyFilter) {
    filtered = [];
    for (var fi = 0; fi < tasks.length; fi++) {
      var st = (tasks[fi].status || '').toLowerCase();
      if (st.indexOf(historyFilter) !== -1) {
        filtered.push(tasks[fi]);
      }
    }
  }

  /* Sort */
  var sc = historySort.col;
  var sd = historySort.dir;
  filtered.sort(function (a, b) {
    var va = a[sc];
    var vb = b[sc];
    if (va == null) va = '';
    if (vb == null) vb = '';
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    if (va < vb) return sd === 'asc' ? -1 : 1;
    if (va > vb) return sd === 'asc' ? 1 : -1;
    return 0;
  });

  var h = '';
  h += '<section class="card">';
  h += '<h2>Task History</h2>';

  /* Filter */
  h += '<div class="filter-row">';
  h += '<label for="historyFilter">Filter by status:</label>';
  h += '<input type="text" id="historyFilter" value="' + esc(historyFilter) + '" placeholder="e.g. failed, running..." />';
  h += '</div>';

  if (filtered.length === 0) {
    h += '<p class="empty">No tasks found</p>';
  } else {
    h += '<div style="overflow-x:auto"><table><thead><tr>';
    var cols = [
      { key: 'id', label: 'ID' },
      { key: 'command', label: 'Command' },
      { key: 'status', label: 'Status' },
      { key: 'createdAt', label: 'Created' },
      { key: 'completedAt', label: 'Completed' },
      { key: 'exitCode', label: 'Exit' },
      { key: 'durationMs', label: 'Duration' }
    ];
    for (var ci = 0; ci < cols.length; ci++) {
      var col = cols[ci];
      var arrow = '';
      if (historySort.col === col.key) {
        arrow = '<span class="sort-arrow">' + (historySort.dir === 'asc' ? '\u25B2' : '\u25BC') + '</span>';
      }
      h += '<th data-sort="' + col.key + '">' + col.label + arrow + '</th>';
    }
    h += '</tr></thead><tbody>';
    for (var j = 0; j < filtered.length; j++) {
      var t = filtered[j];
      h += '<tr class="clickable" data-task-id="' + esc(t.id) + '">';
      h += '<td>' + esc(t.id || '-') + '</td>';
      h += '<td>' + esc(t.command || '-') + '</td>';
      h += '<td>' + badgeHtml(t.status) + '</td>';
      h += '<td>' + timeStr(t.createdAt) + '</td>';
      h += '<td>' + timeStr(t.completedAt) + '</td>';
      h += '<td>' + esc(t.exitCode != null ? String(t.exitCode) : '-') + '</td>';
      h += '<td>' + durationStr(t.durationMs || t.duration) + '</td>';
      h += '</tr>';
    }
    h += '</tbody></table></div>';

    /* Pagination */
    h += '<div class="pagination">';
    h += '<button class="small" id="historyPrev" ' + (historyPage <= 1 ? 'disabled' : '') + '>Previous</button>';
    h += '<span>Page ' + historyPage + ' of ' + totalPages + ' (' + total + ' tasks)</span>';
    h += '<button class="small" id="historyNext" ' + (historyPage >= totalPages ? 'disabled' : '') + '>Next</button>';
    h += '</div>';
  }

  h += '</section>';
  return h;
}

function bindHistoryEvents(data) {
  var total = data && data.total != null ? data.total : 0;
  var totalPages = Math.max(1, Math.ceil(total / HISTORY_PAGE_SIZE));

  /* Filter */
  var filterInput = document.getElementById('historyFilter');
  if (filterInput) {
    filterInput.addEventListener('input', function () {
      historyFilter = filterInput.value.trim().toLowerCase();
      historyPage = 1;
      renderHistory();
    });
  }

  /* Pagination */
  var prevBtn = document.getElementById('historyPrev');
  if (prevBtn) {
    prevBtn.addEventListener('click', function () {
      if (historyPage > 1) { historyPage--; renderHistory(); }
    });
  }
  var nextBtn = document.getElementById('historyNext');
  if (nextBtn) {
    nextBtn.addEventListener('click', function () {
      if (historyPage < totalPages) { historyPage++; renderHistory(); }
    });
  }

  /* Sort headers */
  var headers = document.querySelectorAll('[data-sort]');
  var i;
  for (i = 0; i < headers.length; i++) {
    (function (th) {
      th.addEventListener('click', function () {
        var key = th.getAttribute('data-sort');
        if (historySort.col === key) {
          historySort.dir = historySort.dir === 'asc' ? 'desc' : 'asc';
        } else {
          historySort.col = key;
          historySort.dir = 'asc';
        }
        renderHistory();
      });
    })(headers[i]);
  }

  /* Click row to see task detail */
  var rows = document.querySelectorAll('[data-task-id]');
  for (var j = 0; j < rows.length; j++) {
    (function (row) {
      row.addEventListener('click', function () {
        var id = row.getAttribute('data-task-id');
        if (id) navigate('#/task/' + id);
      });
    })(rows[j]);
  }
}

/* ── Page: Task detail (#/task/:id) ───────────────────── */
function renderTask(id) {
  $main.innerHTML = '<div class="loading">Loading...</div>';
  apiGet('/api/tasks/' + encodeURIComponent(id)).then(function (data) {
    $main.innerHTML = taskHtml(data, id);
    bindTaskEvents(data);
  }).catch(function (e) {
    $main.innerHTML = '<div class="card error-state">Failed to load task: ' + esc(e.message) + '</div>';
  });
}

function taskHtml(data, id) {
  var task = (data && data.task) || data || {};
  var phases = (data && data.phases) || [];

  var h = '';
  h += '<a href="#/history" class="back-link">&larr; Back to history</a>';
  h += '<section class="card">';
  h += '<h2>Task ' + esc(task.id || id) + '</h2>';
  h += '<dl class="kv">';
  h += '<dt>ID</dt><dd>' + esc(task.id || '-') + '</dd>';
  h += '<dt>Command</dt><dd>' + esc(task.command || '-') + '</dd>';
  h += '<dt>Status</dt><dd>' + badgeHtml(task.status) + '</dd>';
  h += '<dt>Exit Code</dt><dd>' + esc(task.exitCode != null ? String(task.exitCode) : '-') + '</dd>';
  h += '<dt>Created</dt><dd>' + timeStr(task.createdAt) + '</dd>';
  h += '<dt>Started</dt><dd>' + timeStr(task.startedAt || task.startTime) + '</dd>';
  h += '<dt>Completed</dt><dd>' + timeStr(task.completedAt) + '</dd>';
  h += '<dt>Duration</dt><dd>' + durationStr(task.durationMs || task.duration) + '</dd>';
  h += '</dl>';
  h += '<div class="action-group">';
  h += '<button class="primary" id="rerunTaskBtn">Re-run</button>';
  h += '</div>';
  h += '</section>';

  /* Stdout */
  if (task.stdout) {
    h += '<section class="card">';
    h += '<h2>stdout</h2>';
    h += '<pre class="logs">' + esc(task.stdout) + '</pre>';
    h += '</section>';
  }

  /* Stderr */
  if (task.stderr) {
    h += '<section class="card">';
    h += '<h2>stderr</h2>';
    h += '<pre class="logs">' + esc(task.stderr) + '</pre>';
    h += '</section>';
  }

  /* Phases */
  if (phases.length > 0) {
    h += '<section class="card">';
    h += '<h2>Phases</h2>';
    h += '<div style="overflow-x:auto"><table><thead><tr>';
    h += '<th>Name</th><th>Status</th><th>Duration</th><th>Output</th>';
    h += '</tr></thead><tbody>';
    for (var i = 0; i < phases.length; i++) {
      var p = phases[i];
      h += '<tr>';
      h += '<td>' + esc(p.name || '-') + '</td>';
      h += '<td>' + badgeHtml(p.status) + '</td>';
      h += '<td>' + durationStr(p.durationMs || p.duration) + '</td>';
      h += '<td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc((p.output || '').slice(0, 200)) + '</td>';
      h += '</tr>';
    }
    h += '</tbody></table></div>';
    h += '</section>';
  }

  return h;
}

function bindTaskEvents(data) {
  var rerunBtn = document.getElementById('rerunTaskBtn');
  if (rerunBtn) {
    rerunBtn.addEventListener('click', function () {
      var task = (data && data.task) || data || {};
      var cmd = task.command;
      if (!cmd) return;
      rerunBtn.disabled = true;
      rerunBtn.textContent = 'Re-running...';
      apiPost('/task', { command: cmd }).then(function (r) {
        navigate('#/task/' + r.id);
      }).catch(function (e) {
        alert('Failed: ' + e.message);
        rerunBtn.disabled = false;
        rerunBtn.textContent = 'Re-run';
      });
    });
  }
}

/* ── Page: Metrics (#/metrics) ──────────────────────────────────────────── */
function renderMetrics() {
  $main.innerHTML = '<div class="loading">Loading...</div>';
  var w = metricsWindow;
  apiGet('/api/metrics?window=' + w).then(function (data) {
    $main.innerHTML = metricsHtml(data, w);
    bindMetricsEvents(data);
  }).catch(function (e) {
    $main.innerHTML = '<div class="card error-state">Failed to load metrics: ' + esc(e.message) + '</div>';
  });
}

function metricsHtml(data, window) {
  var tm = (data && data.taskMetrics) || {};
  var bd = (data && data.budget) || {};
  var tr = (data && data.triggers) || [];
  var totalRuns = tm.totalRuns || 0;
  var passCount = tm.passCount || 0;
  var failCount = tm.failCount || 0;
  var errorCount = tm.errorCount || 0;
  var total = passCount + failCount + errorCount;
  var passRate = total > 0 ? (passCount / total * 100).toFixed(1) : '0.0';

  var budgetStatus = bd.status || 'ok';
  var budgetColor = 'var(--color-text-brand)';
  if (budgetStatus === 'exceeded') budgetColor = 'var(--color-error)';
  else if (budgetStatus === 'warning') budgetColor = 'var(--color-warning)';

  var h = '';

  /* Stat cards */
  h += '<div class="metrics-cards">';
  h += '<div class="stat-card"><div class="stat-value">' + totalRuns + '</div><div class="stat-label">Total Runs</div></div>';
  h += '<div class="stat-card"><div class="stat-value">' + passRate + '%</div><div class="stat-label">Pass Rate</div></div>';
  h += '<div class="stat-card" style="border-color:' + budgetColor + ';color:' + budgetColor + '"><div class="stat-value">' + (bd.remaining != null ? bd.remaining : '-') + '</div><div class="stat-label">Budget Remaining</div></div>';
  h += '</div>';

  /* Window selector */
  h += '<div class="window-selector">';
  var windows = ['10m', '1h', '24h'];
  for (var wi = 0; wi < windows.length; wi++) {
    var w = windows[wi];
    var active = w === window ? ' active' : '';
    h += '<button class="small' + active + '" data-window="' + w + '">' + w + '</button>';
  }
  h += '</div>';

  /* Chart section */
  h += '<section class="card">';
  h += '<h2>Task Distribution</h2>';
  h += '<div class="chart-container"><canvas id="metricsChart"></canvas></div>';
  h += '<p class="note">Note: Throughput time-series data not available from API (only single scalar ' + (tm.throughputTasksPerMin != null ? tm.throughputTasksPerMin.toFixed(2) : '-') + ' tasks/min). Showing pass/fail/error counts for the current window.</p>';
  h += '</section>';

  /* Trigger table */
  h += '<section class="card">';
  h += '<h2>Triggers</h2>';
  if (tr.length === 0) {
    h += '<p class="empty">No triggers configured</p>';
  } else {
    h += '<div style="overflow-x:auto"><table><thead><tr>';
    h += '<th>ID</th><th>Type</th><th>Fire Count</th><th>Last Fired</th><th>Status</th>';
    h += '</tr></thead><tbody>';
    for (var j = 0; j < tr.length; j++) {
      var tg = tr[j];
      h += '<tr>';
      h += '<td>' + esc(tg.id || '-') + '</td>';
      h += '<td>' + badgeHtml(tg.type) + '</td>';
      h += '<td>' + (tg.fireCount != null ? tg.fireCount : 0) + '</td>';
      h += '<td>' + timeStr(tg.lastFiredAt) + '</td>';
      h += '<td>' + badgeHtml(tg.running ? 'running' : 'idle') + '</td>';
      h += '</tr>';
    }
    h += '</tbody></table></div>';
  }
  h += '</section>';

  return h;
}

function bindMetricsEvents(data) {
  /* Window selector */
  var btns = document.querySelectorAll('.window-selector button');
  var i;
  for (i = 0; i < btns.length; i++) {
    (function (btn) {
      btn.addEventListener('click', function () {
        metricsWindow = btn.getAttribute('data-window');
        renderMetrics();
      });
    })(btns[i]);
  }

  /* Chart — render with Chart.js or fallback to plain table */
  var canvas = document.getElementById('metricsChart');
  if (!canvas) return;

  if (typeof Chart === 'undefined') {
    var tm = (data && data.taskMetrics) || {};
    var passCount = tm.passCount || 0;
    var failCount = tm.failCount || 0;
    var errorCount = tm.errorCount || 0;
    var tp = tm.throughputTasksPerMin != null ? tm.throughputTasksPerMin.toFixed(2) : '-';
    var container = canvas.parentNode;
    container.innerHTML = '<p class="note">Chart library unavailable — showing table view</p>'
      + '<table><thead><tr><th>Metric</th><th>Value</th></tr></thead><tbody>'
      + '<tr><td>Pass Count</td><td>' + passCount + '</td></tr>'
      + '<tr><td>Fail Count</td><td>' + failCount + '</td></tr>'
      + '<tr><td>Error Count</td><td>' + errorCount + '</td></tr>'
      + '<tr><td>Throughput</td><td>' + tp + ' tasks/min</td></tr>'
      + '</tbody></table>';
    return;
  }

  var ctx = canvas.getContext('2d');
  var passCount = tm.passCount || 0;
  var failCount = tm.failCount || 0;
  var errorCount = tm.errorCount || 0;

  try {
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: ['Pass', 'Fail', 'Error'],
        datasets: [{
          label: 'Task Outcome Counts',
          data: [passCount, failCount, errorCount],
          borderColor: 'var(--color-text-brand)',
          backgroundColor: 'rgba(0,255,136,0.1)',
          tension: 0.1,
          fill: true,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#e2e4ea' } } },
        scales: {
          x: { ticks: { color: '#969ba8' }, grid: { color: '#282c35' } },
          y: { beginAtZero: true, ticks: { color: '#969ba8' }, grid: { color: '#282c35' } }
        }
      }
    });
  } catch (e) {
    /* Chart init failed — fallback is handled by the parent */
  }
}

/* ── Init ─────────────────────────────────────────────── */
window.addEventListener('hashchange', function () {
  navigate(location.hash || '#/');
});

/* Initial load */
if (!location.hash || location.hash === '#') {
  location.hash = '#/';
} else {
  navigate(location.hash);
}

/* Start WebSocket */
connectWs();

})();
</script>
