planName: pr-babysitter
tasks:
  - id: discover-prs
    command: gh pr list --json number,title,headRefName,state,baseRefName,author,createdAt,isDraft --limit 20
    timeoutMs: 30000
    status: fail
    durationMs: 155
    completedAt: 2026-07-06T15:50:51.090Z
  - id: check-ci
    command: node -e "const c=require('child_process');const n=c.execSync('gh pr list --json number --jq .[].number --limit 20',{encoding:'utf8'}).trim().split('\n').filter(Boolean);n.forEach(p=>{try{const r=c.execSync('gh pr view '+p+' --json statusCheckRollup,mergeable,additions,deletions',{encoding:'utf8',timeout:15000});console.log('=== PR #'+p+' ===');console.log(r.trim());console.log()}catch(e){console.log('=== PR #'+p+' === error:',e.message)}})"
    timeoutMs: 120000
    status: fail
    durationMs: 114
    completedAt: 2026-07-06T15:50:51.090Z
  - id: triage
    command: echo "Triage: LLM analysis of PR and CI data above"
    timeoutMs: 30000
    llm:
      provider: openai
      prompt: You are a senior engineer triaging PRs from task output above. For each PR categorize as: READY_TO_MERGE (CI passes, mergeable) | CI_FAILURE (checks failing) | NEEDS_REVIEW (draft/unreviewed) | DRAFT | NO_ACTION (closed/merged). Output YAML: summary with total/ready_to_merge/ci_failures/needs_review counts and per-PR entries with number/category/ci_status/risk_level/recommendation.
    status: pass
    durationMs: 23
    completedAt: 2026-07-06T15:50:51.090Z
  - id: report
    command: node -e "const d=new Date().toISOString();require('fs').writeFileSync('pr-babysitter-state.md','# PR Babysitter State\n\nLast run: '+d+'\n\nSee plans/pr-babysitter.yaml for full triage results.\n_Generated by pr-babysitter plan_\n')"
    timeoutMs: 15000
    status: fail
    durationMs: 100
    completedAt: 2026-07-06T15:50:51.090Z
  - id: l2-optional-fix
    command: echo "L2 DISABLED. Requires --level L2 flag and human approval per AGENTS.md. When enabled: worktree create -> fix CI failure -> verify -> worktree discard. Max 3 attempts per PR."
    timeoutMs: 10000
    status: pass
    durationMs: 22
    completedAt: 2026-07-06T15:50:51.090Z