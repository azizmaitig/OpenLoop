  - id: design-schema
    command: >-
      opencode run "You are the schema author. Read ALL of these: D:\projects\obsidian\second
      brain\10-Projects\11-Active\agent-loop\.build\facet-engine.md, D:\projects\obsidian\second
      brain\10-Projects\11-Active\agent-loop\.build\facet-daemon.md, D:\projects\obsidian\second
