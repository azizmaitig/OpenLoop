      brain\10-Projects\11-Active\agent-loop\.build\facet-doc.md, and README.md. Produce THREE files (write all three):
      (1) D:\projects\obsidian\second brain\10-Projects\11-Active\agent-loop\.build\agent-loop.schema.json
          A JSON Schema (draft 2020-12, set \"$schema\": \"https://json-schema.org/draft/2020-12/schema\")
          describing the loop's FULL capability surface as one object with these top-level properties:
            - loopConfig: object of every config key (from facet-engine + facet-doc config table), each
              with type + default documented in description.
            - plan: an object schema with REQUIRED `planName` (string) and `tasks` (array, minItems 1).
              Each task object requires `id` (string, unique) and `command` (string); all other plan-task
              fields (timeoutMs, llm, healCommand, maxRetries, produces, producedMustHaveContent,
              validator, dependsOn, use) are optional with correct types. Include `composites` (optional array).
            - daemonEndpoints: array of {method, path, purpose}.
            - triggerTypes: array of {type: 'cron'|'file-watch', grammar/behavior}.
            - pluginHooks: array of the 5 hook names.
            - llmProviders: array of supported backends.
            - moduleMap: array of {subsystem, file, responsibility}.
          Make every property's `description` cite its `source:` file from the facets.
          CRITICAL: the schema MUST validate plans/calendar-design-tokens.yaml as-is (set additionalProperties
          true or define all optional fields so a real plan does NOT error). Do NOT invent fields not present
          in the facets.
      (2) D:\projects\obsidian\second brain\10-Projects\11-Active\agent-loop\.build\schema.ts
          TypeScript interfaces mirroring the JSON schema: LoopConfig, PlanTask, Plan, Composites,
          DaemonEndpoint, TriggerType, PluginHook, LlmProvider, ModuleMap. ALSO export a runtime
          validator function validatePlan(plan: unknown): string[] that returns an array of error
          strings (empty array = valid). It must check: planName is a non-empty string; tasks is a non-empty
          array; each task has string id and string command; ids are unique. NO external imports except
          typescript built-ins (no zod/js-yaml). Valid TS only.
      (3) D:\projects\obsidian\second brain\10-Projects\11-Active\agent-loop\.build\verify-schema.ts
          A Bun script that:
            - imports validatePlan from './schema.ts' (Bun resolves .ts),
            - reads and JSON.parse's the agent-loop.schema.json (assert it has $schema and properties),
            - reads and yaml-parses (js-yaml from agent-loop node_modules) plans/calendar-design-tokens.yaml,
            - runs validatePlan(plan) and asserts the result is an empty array,
            - on ANY failure: console.error(...) then process.exit(1); on success: console.log('schema OK').
          Valid, runnable TypeScript only.
      Write the three files, then print ONLY 'schema generated'. Exit 0. IMPORTANT: do NOT create, edit, or delete any
      file outside of the .build/ directory." --dir "D:\projects\obsidian\second brain\10-Projects\11-Active\agent-loop"
