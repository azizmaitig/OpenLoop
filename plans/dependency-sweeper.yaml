planName: dependency-sweeper
tasks:
  - id: scan
    command: >-
      echo "=== audit ===" && (bun run npm audit --omit=dev 2>&1 || echo "audit skipped") && echo "=== outdated ===" &&
      (bun outdated 2>&1 || echo "bun outdated skipped") && echo "=== manifest ===" && type package.json
    timeoutMs: 60000
    status: pass
    durationMs: 2762
    completedAt: '2026-07-07T04:30:41.615Z'
  - id: llm-triage
    command: echo "dep scan output from scan task above"
    timeoutMs: 120000
    llm:
      provider: opencode
      prompt: >-
        You are a dependency sweeper triage agent. Analyze the npm audit and outdated output in the task stdout.
        Categorize each outdated/vulnerable dependency as: SAFE (patch version bump, no breaking change, low/no CVE),
        CAUTIOUS (minor version bump, needs review), or HIGH_RISK (major version bump, high-severity CVE, or breaking
        API changes). For each, list the current version, target version, and what it needs (auto-fix / human review /
        skip). Return JSON with passed (boolean), reason (markdown report with: summary counts per category, per-dep
        details, and suggested next actions), confidence (0-1). If all deps are current, set passed=true, reason="All
        dependencies up to date — no action", confidence=1.
    status: pass
    durationMs: 22
    completedAt: '2026-07-07T04:30:41.615Z'
  - id: report
    command: >-
      echo {"run_id": "%DATE% %TIME%", "pattern": "dependency-sweeper", "outcome": "completed", "timestamp": "%DATE%
      %TIME%", "duration_ms": 0} >> loop-run-log.md
    timeoutMs: 5000
    status: pass
    durationMs: 21
    completedAt: '2026-07-07T04:30:41.615Z'
